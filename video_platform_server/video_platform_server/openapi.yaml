openapi: 3.0.3
info:
  title: Video Platform Server API
  version: 1.0.0
  description: |
    每次身份验证请求带上 Bearer JWT，未登录可带上 `Bearer guest`。
servers:
  - url: /
security:
  - bearerAuth: [ ]
tags:
  - name: Auth
  - name: User
  - name: Admin
  - name: CheckIn
  - name: Video
  - name: VideoLike
  - name: VideoFavorites
  - name: VideoHistory
  - name: VideoCoins
  - name: Comment
  - name: CommentLikes
  - name: Report

paths:
  /api/auth/login:
    post:
      tags: [ Auth ]
      summary: 登录
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: user1@test.com
              password: password123
      responses:
        '200':
          description: 登录结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  value:
                    success: true
                    token: eyJhbGciOiJIUzI1NiJ9.mock.user3
                failed:
                  value:
                    success: false
                    msg: 登录失败，用户名或密码错误

  /api/auth/register:
    post:
      tags: [ Auth ]
      summary: 注册
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: new_user@test.com
              password: password123
              nickname: NewUser
              bio: Hello, I am new here.
      responses:
        '200':
          description: 注册结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'
              examples:
                success:
                  value:
                    success: true
                    msg: 注册成功
                failed:
                  value:
                    success: false
                    msg: 注册失败，用户名已存在

  /api/auth/change-password:
    post:
      tags: [ Auth ]
      summary: 修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改密码结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/auth/delete-account:
    post:
      tags: [ Auth ]
      summary: 注销账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: 注销结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/users/profile:
    post:
      tags: [ User ]
      summary: 修改个人信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              changeNickname:
                value:
                  nickname: Alice_Updated
              changeBio:
                value:
                  bio: Hello, I am Alice.
      responses:
        '200':
          description: 修改结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/users/me:
    get:
      tags: [ User ]
      summary: 用户信息
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
              example:
                id: 3
                nickname: Alice
                bio: Hello, I am Alice.
                likes: 2
                earn_coins: 50
                videos:
                  - id: 2
                    title: My first vlog
                    thumbnail: http://example.com/t2.jpg
                    likes: 1
                    earn_coins: 0
                  - id: 3
                    title: Cooking tutorial
                    thumbnail: http://example.com/t3.jpg
                    likes: 0
                    earn_coins: 0

  /api/admin/users:
    get:
      tags: [ Admin ]
      summary: 查看所有用户
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUserItem'
              example:
                users:
                  - id: 1
                    nickname: Administrator
                    role: admin
                  - id: 2
                    nickname: BadGuy
                    role: ban
                  - id: 3
                    nickname: Alice
                    role: active

  /api/admin/users/ban:
    post:
      tags: [ Admin ]
      summary: 封禁账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ user_id ]
              properties:
                user_id:
                  type: integer
                  example: 2
      responses:
        '200':
          description: 封禁结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/users/sign-in:
    post:
      tags: [ CheckIn ]
      summary: 签到
      responses:
        '200':
          description: 签到结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/users/sign-in/history:
    get:
      tags: [ CheckIn ]
      summary: 签到记录
      responses:
        '200':
          description: 签到日期列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      type: string
                      format: date
              example:
                records:
                  - '2024-01-01'
                  - '2024-01-02'

  /api/videos:
    get:
      tags: [ Video ]
      summary: 视频列表
      responses:
        '200':
          description: 视频列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/VideoCard'
              example:
                videos:
                  - id: 1
                    title: Platform Introduction
                    thumbnail: http://example.com/t1.jpg
                    likes: 2
                    coins: 2
                  - id: 2
                    title: My first vlog
                    thumbnail: http://example.com/t2.jpg
                    likes: 1
                    coins: 0
                  - id: 4
                    title: Tech Review 2024
                    thumbnail: http://example.com/t4.jpg
                    likes: 1
                    coins: 1

  /api/videos/search:
    get:
      tags: [ Video ]
      summary: 搜索视频
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          example: vlog
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/VideoCard'
                  total_pages:
                    type: integer
              example:
                videos:
                  - id: 2
                    title: My first vlog
                    thumbnail: http://example.com/t2.jpg
                    likes: 1
                    coins: 0
                total_pages: 1

  /api/videos/{id}:
    get:
      tags: [ Video ]
      summary: 视频详情
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: 视频详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoDetailResponse'
              example:
                id: 2
                description: A day in my life
                src: http://example.com/v2.mp4
                comments:
                  - id: 2
                    content: Nice vlog!
                    likes: 1
                    parent_id: null
                  - id: 3
                    content: Thanks!
                    likes: 0
                    parent_id: 2

  /api/videos/publish:
    post:
      tags: [ Video ]
      summary: 发布视频
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishVideoRequest'
            example:
              title: Cat compilation
              description: Cute cats
              src: http://example.com/v9.mp4
              thumbnail: http://example.com/t9.jpg
      responses:
        '200':
          description: 发布结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/upload:
    post:
      tags: [ Video ]
      summary: 上传视频
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                video:
                  type: string
                  format: binary
                thumbnail:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  msg:
                    type: string
                  video_url:
                    type: string
                  thumbnail_url:
                    type: string

  /api/admin/videos/pending:
    get:
      tags: [ Admin ]
      summary: 查看审核视频
      responses:
        '200':
          description: 待审核视频列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        title: { type: string }
                        thumbnail: { type: string }
                        uploader: { type: string }
              example:
                videos:
                  - id: 7
                    title: Unboxing new phone
                    thumbnail: http://example.com/t7.jpg
                    uploader: Bob
                  - id: 13
                    title: Daily news
                    thumbnail: http://example.com/t13.jpg
                    uploader: Charlie

  /api/admin/videos/review:
    post:
      tags: [ Admin ]
      summary: 审核视频
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ video_id, action ]
              properties:
                video_id:
                  type: integer
                  example: 7
                action:
                  type: string
                  enum: [ approve, reject ]
                  example: approve
      responses:
        '200':
          description: 审核结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/like:
    post:
      tags: [ VideoLike ]
      summary: 点赞视频
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoIdRequest'
            example:
              video_id: 1
      responses:
        '200':
          description: 点赞结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/unlike:
    post:
      tags: [ VideoLike ]
      summary: 取消点赞
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoIdRequest'
      responses:
        '200':
          description: 取消点赞结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/favorite:
    post:
      tags: [ VideoFavorites ]
      summary: 收藏视频
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoIdRequest'
      responses:
        '200':
          description: 收藏结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/unfavorite:
    post:
      tags: [ VideoFavorites ]
      summary: 取消收藏
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoIdRequest'
      responses:
        '200':
          description: 取消收藏结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/favorites:
    get:
      tags: [ VideoFavorites ]
      summary: 收藏的视频
      responses:
        '200':
          description: 收藏列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/VideoCard'
              example:
                videos:
                  - id: 1
                    title: Platform Introduction
                    thumbnail: http://example.com/t1.jpg
                    likes: 2
                    coins: 2
                  - id: 9
                    title: Cat compilation
                    thumbnail: http://example.com/t9.jpg
                    likes: 1
                    coins: 2

  /api/videos/history:
    get:
      tags: [ VideoHistory ]
      summary: 历史浏览
      responses:
        '200':
          description: 历史浏览列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/VideoCard'
              example:
                videos:
                  - id: 1
                    title: Platform Introduction
                    thumbnail: http://example.com/t1.jpg
                    likes: 2
                    coins: 2
                  - id: 4
                    title: Tech Review 2024
                    thumbnail: http://example.com/t4.jpg
                    likes: 1
                    coins: 1

  /api/videos/coin:
    post:
      tags: [ VideoCoins ]
      summary: 投币
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoinRequest'
            example:
              video_id: 1
              coins: 2
      responses:
        '200':
          description: 投币结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/comments:
    post:
      tags: [ Comment ]
      summary: 发表评论
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
            example:
              video_id: 1
              content: Great introduction!
              parent_id: null
      responses:
        '200':
          description: 评论结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/comments/{id}:
    delete:
      tags: [ Comment ]
      summary: 删除评论
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 5
      responses:
        '200':
          description: 删除结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/comments/like:
    post:
      tags: [ CommentLikes ]
      summary: 点赞评论
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentIdRequest'
            example:
              comment_id: 1
      responses:
        '200':
          description: 点赞评论结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/comments/unlike:
    post:
      tags: [ CommentLikes ]
      summary: 取消点赞评论
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentIdRequest'
      responses:
        '200':
          description: 取消点赞评论结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/videos/report:
    post:
      tags: [ Report ]
      summary: 举报视频
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ video_id, reason ]
              properties:
                video_id:
                  type: integer
                  example: 8
                reason:
                  type: string
                  example: Spam content
      responses:
        '200':
          description: 举报结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

  /api/admin/reports:
    get:
      tags: [ Admin ]
      summary: 查看举报列表
      responses:
        '200':
          description: 举报列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        video_id: { type: integer }
                        reason: { type: string }
                        reporter: { type: string }
              example:
                reports:
                  - id: 1
                    video_id: 8
                    reason: Spam content
                    reporter: Alice
                  - id: 2
                    video_id: 20
                    reason: Also spam
                    reporter: Bob

  /api/admin/reports/handle:
    post:
      tags: [ Admin ]
      summary: 处理举报
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ report_id, action ]
              properties:
                report_id:
                  type: integer
                  example: 2
                action:
                  type: string
                  enum: [ approve, reject ]
                  example: approve
      responses:
        '200':
          description: 处理举报结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVO'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 未登录访问可使用固定值 `guest` 作为 token。
  schemas:
    ResultVO:
      type: object
      properties:
        success:
          type: boolean
        msg:
          type: string
      required: [ success ]

    LoginResponse:
      oneOf:
        - type: object
          properties:
            success:
              type: boolean
              enum: [ true ]
            token:
              type: string
          required: [ success, token ]
        - type: object
          properties:
            success:
              type: boolean
              enum: [ false ]
            msg:
              type: string
          required: [ success, msg ]

    LoginRequest:
      type: object
      required: [ username, password ]
      properties:
        username:
          type: string
          description: 登录名
        password:
          type: string

    RegisterRequest:
      type: object
      required: [ username, password, nickname, bio ]
      properties:
        username:
          type: string
          format: email
          description: 登录名
        password:
          type: string
        nickname:
          type: string
          description: 用户名称
        bio:
          type: string

    ChangePasswordRequest:
      type: object
      required: [ old_password, new_password ]
      properties:
        old_password:
          type: string
        new_password:
          type: string

    DeleteAccountRequest:
      type: object
      required: [ password ]
      properties:
        password:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          description: 用户名称
        bio:
          type: string
      minProperties: 1

    AdminUserItem:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
          description: 用户名称
        role:
          type: string
          enum: [ active, ban, admin ]

    VideoCard:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        thumbnail:
          type: string
        likes:
          type: integer
        coins:
          type: integer
      required: [ id, title, thumbnail, likes, coins ]

    VideoDetailResponse:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        src:
          type: string
        comments:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              content:
                type: string
              likes:
                type: integer
              parent_id:
                type: integer
                nullable: true
      required: [ id, description, src, comments ]

    PublishVideoRequest:
      type: object
      required: [ title, description, src, thumbnail ]
      properties:
        title:
          type: string
        description:
          type: string
        src:
          type: string
        thumbnail:
          type: string

    UserMeResponse:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
          description: 用户名称
        bio:
          type: string
        likes:
          type: integer
        earn_coins:
          type: integer
        videos:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              thumbnail:
                type: string
              likes:
                type: integer
              earn_coins:
                type: integer

    VideoIdRequest:
      type: object
      required: [ video_id ]
      properties:
        video_id:
          type: integer

    CoinRequest:
      type: object
      required: [ video_id, coins ]
      properties:
        video_id:
          type: integer
        coins:
          type: integer
          minimum: 1

    CreateCommentRequest:
      type: object
      required: [ video_id, content ]
      properties:
        video_id:
          type: integer
        content:
          type: string
        parent_id:
          type: integer
          nullable: true

    CommentIdRequest:
      type: object
      required: [ comment_id ]
      properties:
        comment_id:
          type: integer

